<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Sound of Art Tattoo</title>
    <link rel="stylesheet" href="src/index.css">
</head>
<body class="bg-zinc-950 text-zinc-300 font-sans relative">
    <!-- Grunge Overlay -->
    <div class="grunge-overlay"></div>

    <!-- Header -->
    <header class="fixed top-0 left-0 w-full z-50 bg-zinc-950/40 backdrop-blur-sm border-b border-teal-500/10">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3 group">
                <div class="w-12 h-12 bg-teal-600 rounded-full aspect-square flex items-center justify-center group-hover:bg-teal-400 transition-all shadow-[4px_4px_0_rgba(0,0,0,1)] overflow-hidden">
                    <img src="public/branding/logo.png" alt="Sound of Art Tattoo Logo" class="w-full h-full object-cover" referrerpolicy="no-referrer">
                </div>
                <span class="rock-text text-3xl tracking-tighter uppercase text-teal-500 glitch-hover">Sound of Art Tattoo</span>
            </a>
            <nav class="hidden md:flex items-center gap-10">
                <a href="index.html" class="grunge-text text-sm uppercase tracking-widest hover:text-teal-400 transition-colors">Home</a>
                <a href="portfolio.html" class="grunge-text text-sm uppercase tracking-widest text-teal-400 border-b-2 border-teal-500">Portfolio</a>
                <a href="index.html#about" class="grunge-text text-sm uppercase tracking-widest hover:text-teal-400 transition-colors">About</a>
                <a href="index.html#contact" class="px-6 py-2 bg-teal-600 text-zinc-950 rock-text text-sm uppercase tracking-widest hover:bg-teal-400 transition-all shadow-[4px_4px_0_rgba(0,0,0,1)] hover:shadow-none hover:translate-x-1 hover:translate-y-1">Contact</a>
            </nav>
            <button id="mobile-menu-btn" class="md:hidden text-teal-500">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
            </button>
        </div>
    </header>

    <!-- Mobile Menu Overlay -->
    <div id="mobile-menu" class="fixed inset-0 z-[60] bg-zinc-950 flex flex-col items-center justify-center gap-10 opacity-0 pointer-events-none transition-opacity duration-300">
        <a href="index.html" class="rock-text text-5xl uppercase tracking-widest hover:text-teal-400">Home</a>
        <a href="portfolio.html" class="rock-text text-5xl uppercase tracking-widest text-teal-400">Portfolio</a>
        <a href="index.html#about" class="rock-text text-5xl uppercase tracking-widest hover:text-teal-400">About</a>
        <a href="index.html#contact" class="rock-text text-5xl uppercase tracking-widest hover:text-teal-400">Contact</a>
        <button id="close-menu-btn" class="absolute top-8 right-8 text-teal-500">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg>
        </button>
    </div>

    <!-- Hero Section -->
    <section class="relative h-[70vh] flex items-center justify-center overflow-hidden pt-20">
        <!-- Hero Background Panels -->
        <div class="absolute inset-0 z-0 flex gap-2 md:gap-4 -skew-x-3 md:-skew-x-6 scale-110">
            <div class="flex-1 h-full overflow-hidden border-x border-teal-500/10">
                <img 
                    src="public/img/Portfolio10.jpeg" 
                    alt="Portfolio 1" 
                    class="w-full h-full object-cover opacity-60 skew-x-3 md:skew-x-6 scale-110"
                    referrerpolicy="no-referrer"
                >
            </div>
            <div class="flex-1 h-full overflow-hidden border-x border-teal-500/10">
                <img 
                    src="public/img/Portfolio14.jpeg" 
                    alt="Portfolio 2" 
                    class="w-full h-full object-cover opacity-70 skew-x-3 md:skew-x-6 scale-110"
                    referrerpolicy="no-referrer"
                >
            </div>
            <div class="flex-1 h-full overflow-hidden border-x border-teal-500/10">
                <img 
                    src="public/img/Portfolio15.jpeg" 
                    alt="Portfolio 3" 
                    class="w-full h-full object-cover opacity-60 skew-x-3 md:skew-x-6 scale-110"
                    referrerpolicy="no-referrer"
                >
            </div>
        </div>
        
        <!-- Global Overlays -->
        <div class="absolute inset-0 z-[1] bg-gradient-to-t from-zinc-950 via-zinc-950/60 to-transparent"></div>
        <div class="absolute inset-0 z-[1] opacity-20 bg-[url('https://www.transparenttextures.com/patterns/asfalt-dark.png')]"></div>

        <div class="relative z-10 text-center px-6">
            <h1 class="rock-text text-7xl md:text-[6rem] leading-none mb-6 text-zinc-100 drop-shadow-[8px_8px_0_rgba(13,148,136,0.3)]">Portfolio</h1>
            <p class="rock-text text-2xl md:text-4xl text-white/90 mb-4 tracking-widest uppercase">A collection of my previous work.</p>
            <p class="grunge-text text-zinc-400 text-sm md:text-base uppercase tracking-[0.3em] max-w-2xl mx-auto">
                I specialize in realism and portrait tattooing in both black and white and color.
            </p>
        </div>
    </section>

    <main class="py-32 px-6 max-w-7xl mx-auto">
        <!-- Filter Tabs -->
        <div class="flex flex-wrap gap-6 mb-20" id="filter-container">
            <button data-filter="all" class="filter-btn active">All Work</button>
            <button data-filter="bw" class="filter-btn">Black & White</button>
            <button data-filter="color" class="filter-btn">Color</button>
            <button data-filter="realism" class="filter-btn">Realism</button>
            <button data-filter="portrait" class="filter-btn">Portrait</button>
        </div>

        <!-- Portfolio Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10" id="portfolio-grid">
            <!-- Items will be injected by JS -->
        </div>
    </main>

    <!-- Lower Hero Section -->
    <section id="contact" class="py-40 bg-zinc-950 border-y border-teal-900/30 relative overflow-hidden">
        <!-- Background Collage Panels -->
        <div class="absolute inset-0 z-0 flex gap-2 md:gap-4 skew-x-3 md:skew-x-6 scale-110">
            <div class="flex-1 h-full overflow-hidden border-x border-teal-500/5">
                <img 
                    src="public/img/Portfolio4.jpeg" 
                    alt="Portfolio 4" 
                    class="w-full h-full object-cover opacity-50 -skew-x-3 md:-skew-x-6 scale-110 transition-all duration-700"
                    referrerpolicy="no-referrer"
                >
            </div>
            <div class="flex-1 h-full overflow-hidden border-x border-teal-500/5">
                <img 
                    src="public/img/Portfolio7.jpeg" 
                    alt="Portfolio 5" 
                    class="w-full h-full object-cover opacity-60 -skew-x-3 md:-skew-x-6 scale-110 transition-all duration-700"
                    referrerpolicy="no-referrer"
                >
            </div>
            <div class="flex-1 h-full overflow-hidden border-x border-teal-500/5">
                <img 
                    src="public/img/Portfolio5.jpeg" 
                    alt="Portfolio 6" 
                    class="w-full h-full object-cover opacity-50 -skew-x-3 md:-skew-x-6 scale-110 transition-all duration-700"
                    referrerpolicy="no-referrer"
                >
            </div>
        </div>

        <!-- Overlays -->
        <div class="absolute inset-0 z-[1] bg-zinc-950/50"></div>
        <div class="absolute inset-0 z-[1] opacity-10 bg-[url('https://www.transparenttextures.com/patterns/asfalt-dark.png')]"></div>

        <div class="max-w-7xl mx-auto px-6 text-center relative z-10">
            <h2 class="rock-text text-4xl md:text-6xl mb-16 uppercase tracking-widest">Get in <span class="text-teal-500">Touch</span></h2>
            <div class="flex justify-center gap-16">
                <a href="https://instagram.com" target="_blank" class="group flex flex-col items-center gap-6">
                    <div class="w-24 h-24 border-2 border-teal-600/30 flex items-center justify-center group-hover:bg-teal-600 group-hover:text-zinc-950 transition-all duration-300 rotate-[-4deg] group-hover:rotate-0 shadow-[8px_8px_0_rgba(0,0,0,1)]">
                        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
                    </div>
                    <span class="grunge-text text-sm uppercase tracking-[0.3em] text-zinc-500 group-hover:text-teal-500 transition-colors">Instagram</span>
                </a>
                <a href="https://facebook.com" target="_blank" class="group flex flex-col items-center gap-6">
                    <div class="w-24 h-24 border-2 border-teal-600/30 flex items-center justify-center group-hover:bg-teal-600 group-hover:text-zinc-950 transition-all duration-300 rotate-[4deg] group-hover:rotate-0 shadow-[8px_8px_0_rgba(0,0,0,1)]">
                        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
                    </div>
                    <span class="grunge-text text-sm uppercase tracking-[0.3em] text-zinc-500 group-hover:text-teal-500 transition-colors">Facebook</span>
                </a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="py-20 px-6 border-t border-teal-900/20">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-10">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-teal-600 rounded-full aspect-square flex items-center justify-center overflow-hidden shadow-[4px_4px_0_rgba(0,0,0,1)]">
                    <img src="public/branding/logo.png" alt="Sound of Art Tattoo Logo" class="w-full h-full object-cover" referrerpolicy="no-referrer">
                </div>
                <span class="rock-text text-2xl text-teal-500 uppercase tracking-tighter">Sound of Art Tattoo</span>
            </div>
            <p class="grunge-text text-xs text-zinc-600 uppercase tracking-[0.2em]">© 2026 Sound of Art Tattoo.</p>
        </div>
    </footer>

    <script type="module" src="src/portfolio.js"></script>
</body>
</html>
